    <script type="text/javascript">
        // Minimal i18n mock
        window.gettext = function(text) { return text; };
        window.ngettext = function(singular, plural, count) { return count === 1 ? singular : plural; };
        window.interpolate = function(fmt, obj, named) {
            if (named) {
                return fmt.replace(/%\(\w+\)s/g, function(match){return String(obj[match.slice(2,-2)])});
            } else {
                return fmt.replace(/%s/g, function(){return String(obj.shift())});
            }
        };
        window.get_format = function(format_type) { return format_type; };
        window.pluralidx = function(count) { return count === 1 ? 0 : 1; };

        // Frontend settings
        window.settings = {
            STATIC_URL: "/static/",
            VERSION: "1778367498",
            DEBUG: true,
            CSRF_COOKIE_NAME: "csrftoken",
            E2EE_MODE: "",
            COLLABORATIVE_EDITING: false,
            REGISTRATION_OPEN: false,
            SOCIALACCOUNT_OPEN: false,
            PASSWORD_LOGIN: false,
            CONTACT_EMAIL: "",
            IS_FREE: true,
            TEST_SERVER: false,
            SOURCE_MAPS: false,
            USE_SERVICE_WORKER: false,
            MEDIA_MAX_SIZE: 10000000,
            FOOTER_LINKS: [],
            LANGUAGES: [["en", "English"]],
            BRANDING_LOGO: "",
            TWO_FACTOR_ENABLED: false
        };
        window.settings.staticUrl = function(url) {
            return window.settings.STATIC_URL + url + "?v=" + window.settings.VERSION;
        };
        window.settings.apiUrl = function(url) {
            return url;
        };
        window.settings.getCsrfToken = function() {
            var name = window.settings.CSRF_COOKIE_NAME || "csrftoken";
            if (!document.cookie || document.cookie === "") {
                return null;
            }
            var cookie = document.cookie
                .split(";")
                .map(function(c) { return c.trim(); })
                .find(function(c) {
                    return c.substring(0, name.length + 1) === name + "=";
                });
            if (cookie) {
                return decodeURIComponent(cookie.substring(name.length + 1));
            }
            return null;
        };
        window.settings.postResponseHook = function(response) {
            return response;
        };
        window.staticUrl = window.settings.staticUrl;
    </script>

    <!-- POC customizations -->
    <script type="text/javascript">
        (function customizePOC() {
            const app = window.theApp
            if (!app?.routes) {
                requestAnimationFrame(customizePOC)
                return
            }
            // 1. Rewrite "/" to "/document/1/" before selectPage runs
            const originalSelectPage = app.selectPage.bind(app)
            app.selectPage = function() {
                if (window.location.pathname === "/") {
                    window.history.replaceState({}, "", "/document/1/")
                }
                return originalSelectPage()
            }

            // 2. Remove unused File menu items once editor loads
            function removeUnusedMenuItems() {
                const editor = app.page
                if (!editor?.menu?.headerbarModel) {
                    requestAnimationFrame(removeUnusedMenuItems)
                    return
                }
                const fileMenu = editor.menu.headerbarModel.content[0]
                if (!fileMenu?.content) {
                    requestAnimationFrame(removeUnusedMenuItems)
                    return
                }
                // Remove in reverse order so indices remain valid
                fileMenu.content.splice(6, 1)  // Change password
                fileMenu.content.splice(3, 1)  // Create copy
                fileMenu.content.splice(2, 1)  // Save revision
                fileMenu.content.splice(0, 1)  // Share/Request Access
                if (editor.menu.headerView) {
                    editor.menu.headerView.update()
                }
                console.log("POC: removed unused File menu items")
            }
            removeUnusedMenuItems()
        })()
    </script>
